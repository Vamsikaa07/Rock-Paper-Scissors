<!DOCTYPE html>
<html>
  <head>
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href ="rps.css">
  </head>
  
  <body>
    <p class="Title">Rock Paper Scissors</p>

    <button class="move-button" onclick="
    playGame('Rock');
    "><img class="move-icon" src="Rock-Paper-Scissors/images/rock-emoji.png"></button>

    <button class="move-button" onclick="
    playGame('Paper');
    "><img class="move-icon" src="Rock-Paper-Scissors/images/paper-emoji.png"></button>

    <button class="move-button" onclick="
    playGame('Scissors');
    "><img class="move-icon" src="Rock-Paper-Scissors/images/scissors-emoji.png"></button>
   
    <p class = "js-result result"></p>
    <p class = "js-moves "></p>
    <p class = "js-score score"></p>

    <button class ="Reset"onclick="
        score.wins=0;
        score.lose=0;
        score.tie= 0;
        localStorage.removeItem('score');
        updateScore();
    ">Reset Score</button>
    <button class="Autoplay-button" onclick="
    autoPlay();
    ">Auto Play</button>

    <script src="rps.js"></script>

  </body>
</html>
